services:
  mysql:
    image: mysql:8.0
    container_name: notification-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --log-replica-updates=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MySQL Replica (read-only)
  # datasource.routing.enabled=true 일 때 readOnly 트랜잭션을 Replica로 라우팅
  # ─────────────────────────────────────────
  mysql-slave:
    image: mysql:8.0
    container_name: notification-mysql-slave
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --log-replica-updates=ON
      --relay-log=relay-bin
      --read-only=ON
      --super-read-only=ON
      --skip-replica-start=ON
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-replica-setup:
    image: mysql:8.0
    container_name: notification-mysql-replica-setup
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    volumes:
      - ./mysql-init:/replica-init:ro
    command: ["/bin/sh", "/replica-init/03-replica-setup.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: notification-mysqld-exporter
    ports:
      - "9104:9104"
    volumes:
      - ./mysqld-exporter/my.cnf:/etc/mysqld-exporter/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysqld-exporter/my.cnf"
      - "--mysqld.address=notification-mysql:3306"
      - "--collect.info_schema.innodb_metrics"
    depends_on:
      mysql:
        condition: service_healthy

  mysqld-exporter-slave:
    image: prom/mysqld-exporter:latest
    container_name: notification-mysqld-exporter-slave
    ports:
      - "9105:9104"
    volumes:
      - ./mysqld-exporter/my.cnf:/etc/mysqld-exporter/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysqld-exporter/my.cnf"
      - "--mysqld.address=notification-mysql-slave:3306"
      - "--collect.info_schema.innodb_metrics"
    depends_on:
      mysql-slave:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: notification-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && exec rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: notification-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://notification-redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mysql-data:
  mysql-slave-data:
  redis-data:
