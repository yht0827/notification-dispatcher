services:
  mysql:
    image: mysql:8.0
    container_name: notification-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: notification-mysqld-exporter
    ports:
      - "9104:9104"
    volumes:
      - ./mysqld-exporter/my.cnf:/etc/mysqld-exporter/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysqld-exporter/my.cnf"
      - "--mysqld.address=notification-mysql:3306"
    depends_on:
      mysql:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: notification-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://notification-redis:6379
    command:
      - "--check-streams=notification-stream,notification-stream-dlq,notification-stream-wait"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
