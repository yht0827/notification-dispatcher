global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'notification-dispatcher'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_interval: 5s

  - job_name: 'mysql-master'
    static_configs:
      - targets: ['host.docker.internal:9104']
    scrape_interval: 5s

  - job_name: 'mysql-slave'
    static_configs:
      - targets: ['host.docker.internal:9105']
    scrape_interval: 5s

  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121']
    scrape_interval: 5s

  - job_name: 'rabbitmq'
    metrics_path: '/metrics/per-object'
    static_configs:
      - targets: ['host.docker.internal:15692']
    scrape_interval: 5s

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 5s
