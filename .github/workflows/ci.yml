name: CI

on:
  push:
    branches: [ main, develop, feature* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test with coverage verification
        run: ./gradlew check jacocoAggregateReport

      - name: Upload aggregate coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: build/reports/jacoco/aggregate/
          retention-days: 7

      - name: Upload module coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-module-reports
          path: |
            domain/build/reports/jacoco/
            application/build/reports/jacoco/
            infrastructure/build/reports/jacoco/
            api/build/reports/jacoco/
          retention-days: 7
