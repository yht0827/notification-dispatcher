server:
  port: 8081

spring:
  application:
    name: mock-send
  jackson:
    mapper:
      accept-case-insensitive-enums: true
    deserialization:
      read-unknown-enum-values-using-default-value: true

mock:
  mode: RANDOM  # RANDOM | ALWAYS_SUCCESS | ALWAYS_FAIL | ALWAYS_DELAY
  latency:
    enabled: true
    probability: 0.25
    min-ms: 800
    max-ms: 4000
  failure:
    enabled: true
    probability: 0.10
    types: [ 500, 503, 429 ]
    retry-after-seconds: 15
  log:
    include-masked-message-preview: false
    message-preview-length: 20
