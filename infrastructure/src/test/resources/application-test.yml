spring:
  cloud:
    compatibility-verifier:
      enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  consumer:
    enabled: false

notification:
  messaging:
    enabled: false
  external:
    mock:
      enabled: false
      base-url: http://localhost:8081
