spring:
  application:
    name: notification-dispatcher
  profiles:
    active: local
  threads:
    virtual:
      enabled: false
  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          mockApi:
            connect-timeout: 1000
            read-timeout: 5000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

# ─────────────────────────────────────────
# Notification Messaging (공통 기본값)
# ─────────────────────────────────────────
notification:
  messaging:
    enabled: true
  rabbitmq:
    listener-virtual-threads: false
  external:
    mock:
      name: mockApi
      enabled: false
      base-url: http://localhost:8081
      send-path: /mock/send

# ─────────────────────────────────────────
# Resilience4j
# ─────────────────────────────────────────
resilience4j:
  retry:
    retry-aspect-order: 2
    instances:
      mockApi:
        max-attempts: 2
        wait-duration: 200ms
        enable-exponential-backoff: false
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiRetryableException
        ignore-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiNonRetryableException
  circuitbreaker:
    circuit-breaker-aspect-order: 1
    instances:
      mockApi:
        sliding-window-size: 20
        minimum-number-of-calls: 20
        failure-rate-threshold: 50 # 10건 중 5건 실패 시 OPEN
        wait-duration-in-open-state: 10s
        record-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiRetryableException
        ignore-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiNonRetryableException
# ─────────────────────────────────────────
# Actuator / Metrics
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ─────────────────────────────────────────
# Outbox / Recovery
# ─────────────────────────────────────────
outbox:
  poll-interval-millis: 1000        # 1초마다 폴링
  batch-size: 100                   # 1회당 100개씩 처리

recovery:
  poll-interval-millis: 300000      # 5분마다 폴링
  threshold-minutes: 5              # 5분 이상 PENDING이면 복구
  batch-size: 100                   # 1회당 100개씩 처리

archive:
  enabled: false
  run-on-startup: false
  retention-days: 7
  batch-size: 1000
  cron: "0 0 0 * * *"
  partition-cron: "0 5 0 1 * *"

---
# ─────────────────────────────────────────
# Local 환경
# ─────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:application}
    password: ${RABBITMQ_PASSWORD:application}
  datasource:
    url: jdbc:mysql://localhost:3306/notification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: application
    password: application
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000   # 5초 대기 후 TimeoutException (기본 30초)
      data-source-properties:
        rewriteBatchedStatements: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

notification:
  rabbitmq:
    work-queue: notification.work              # Work 큐 이름
    work-exchange: notification.work.exchange  # Work Exchange
    wait-queue: notification.wait              # Wait 큐 이름
    dlq-queue: notification.dlq                # DLQ 큐 이름
    dlq-exchange: notification.dlq.exchange    # DLQ Exchange
    max-retry-count: 3                         # 최대 재시도 횟수
    retry-base-delay-millis: 5000              # 기본 재시도 지연 (ms)
    concurrency: 2
    max-concurrency: 2
    prefetch: 100
    batch-listener-enabled: true               # 배치 리스너 활성화
    batch-size: 50                             # 배치 수집 크기
    batch-receive-timeout-millis: 200          # 배치 수집 대기(ms)
  external:
    mock:
      enabled: true

---
# ─────────────────────────────────────────
# Test 환경 (Testcontainers)
# ─────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

---
# ─────────────────────────────────────────
# Production 환경
# ─────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      data-source-properties:
        rewriteBatchedStatements: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
