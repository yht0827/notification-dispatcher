spring:
  application:
    name: notification-dispatcher
  profiles:
    active: local
  threads:
    virtual:
      enabled: true
  cloud:
    compatibility-verifier:
      enabled: false

# ─────────────────────────────────────────
# Notification Messaging (공통 기본값)
# ─────────────────────────────────────────
notification:
  messaging:
    enabled: true
  external:
    mock:
      name: mockApi
      enabled: false
      base-url: http://localhost:8081
      send-path: /mock/send

# ─────────────────────────────────────────
# Feign Client
# ─────────────────────────────────────────
feign:
  client:
    config:
      mockApi:
        connect-timeout: 1000
        read-timeout: 3000

# ─────────────────────────────────────────
# Resilience4j
# ─────────────────────────────────────────
resilience4j:
  retry:
    retry-aspect-order: 2
    instances:
      mockApi:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiRetryableException
        ignore-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiNonRetryableException
  circuitbreaker:
    circuit-breaker-aspect-order: 1
    instances:
      mockApi:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50 # 10건 중 5건 실패 시 OPEN
        wait-duration-in-open-state: 10s
        record-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiRetryableException
        ignore-exceptions:
          - com.example.infrastructure.sender.mock.exception.MockApiNonRetryableException
# ─────────────────────────────────────────
# Actuator / Metrics
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ─────────────────────────────────────────
# Outbox / Recovery
# ─────────────────────────────────────────
outbox:
  poll-interval-millis: 1000
  batch-size: 200

recovery:
  batch-size: 100
  threshold-minutes: 5
  poll-interval-millis: 300000   # 5분

---
# ─────────────────────────────────────────
# Local 환경
# ─────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local
  rabbitmq:
    host: localhost
    port: 5672
    username: application
    password: application
  datasource:
    url: jdbc:mysql://localhost:3306/notification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: application
    password: application
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 5000   # 5초 대기 후 TimeoutException (기본 30초)
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

notification:
  rabbitmq:
    work-queue: notification.work
    work-exchange: notification.work.exchange
    wait-queue: notification.wait
    dlq-queue: notification.dlq
    dlq-exchange: notification.dlq.exchange
    max-retry-count: 3
    retry-base-delay-millis: 5000
    concurrency: 1
    max-concurrency: 10
  external:
    mock:
      enabled: true

---
# ─────────────────────────────────────────
# Test 환경 (Testcontainers)
# ─────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

---
# ─────────────────────────────────────────
# Production 환경
# ─────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
