spring:
  application:
    name: notification-dispatcher
  profiles:
    active: local

notification:
  stream:
    enabled: true

---
# Local 환경
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/notification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: application
    password: application
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

notification:
  stream:
    key: notification-stream
    consumer-group: notification-group
    consumer-name: consumer-1
    poll-interval: 1000
    batch-size: 10
    dead-letter-key: notification-stream-dlq
    wait-key: notification-stream-wait
    max-retry-count: 3
    retry-base-delay-millis: 5000
    wait-poll-interval-millis: 1000

---
# Test 환경 (Testcontainers)
spring:
  config:
    activate:
      on-profile: test
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

---
# Production 환경
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
